<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Minimap</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin:15px 0 10px;
}

#panel{
margin-bottom:10px;
}

button, select{
padding:8px 12px;
margin:3px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
background:white;
transition:0.2s;
}

button:hover,
select:hover{
background:#9e9e9e;
}

.active{
background:#66ccff !important;
color:black;
}

#wrap{
position:relative;
display:inline-block;
margin-bottom:20px;
}

canvas{
background:#000;
cursor:crosshair;
}
</style>
</head>

<body>

<h1>My Minimap</h1>

<div id="panel">

<button id="usBtn">US</button>
<button id="enemyBtn">ENEMY</button>
<button id="arrowBtn">ARROW</button>
<button id="flagBtn">FLAG</button>
<button id="deleteBtn">DELETE LAST</button>
<button id="saveBtn">SAVE</button>
<button id="loadBtn">LOAD</button>

<select id="mapSelect">
<option value="map.png">MAP 1</option>
<option value="map2.png">MAP 2</option>
<option value="map3.png">MAP 3</option>
<option value="map4.png">MAP 4</option>
<option value="map5.png">MAP 5</option>
</select>

</div>

<div id="wrap">
<canvas id="cv"></canvas>
</div>

<script>
const canvas=document.getElementById("cv");
const ctx=canvas.getContext("2d");

const img=new Image();
img.src="map.png";

let mode="us";

let tanks=[];
let arrows=[];
let flags=[];

let arrowStart=null;

const grid=45;
const leftOffset=8;
const topOffset=8;

function setActive(id){

document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));

if(id) document.getElementById(id).classList.add("active");
}

setActive("usBtn");

document.getElementById("usBtn").onclick=()=>{
mode="us";
setActive("usBtn");
};

document.getElementById("enemyBtn").onclick=()=>{
mode="enemy";
setActive("enemyBtn");
};

document.getElementById("arrowBtn").onclick=()=>{
mode="arrow";
setActive("arrowBtn");
};

document.getElementById("flagBtn").onclick=()=>{
mode="flag";
setActive("flagBtn");
};

document.getElementById("deleteBtn").onclick=()=>{
if(tanks.length)tanks.pop();
else if(flags.length)flags.pop();
else if(arrows.length)arrows.pop();
};

document.getElementById("saveBtn").onclick=()=>{
localStorage.setItem("mini_tanks",JSON.stringify(tanks));
localStorage.setItem("mini_flags",JSON.stringify(flags));
localStorage.setItem("mini_arrows",JSON.stringify(arrows));
alert("Saved");
};

document.getElementById("loadBtn").onclick=()=>{
tanks=JSON.parse(localStorage.getItem("mini_tanks")||"[]");
flags=JSON.parse(localStorage.getItem("mini_flags")||"[]");
arrows=JSON.parse(localStorage.getItem("mini_arrows")||"[]");
};

document.getElementById("mapSelect").onchange=function(){
img.src=this.value;
tanks=[];
flags=[];
arrows=[];
};

canvas.onclick=(e)=>{

const rect=canvas.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

if(mode==="us"){
const name=prompt("Tank name:");
if(!name)return;
tanks.push({
x,y,
color:"#1e90ff",
name
});
}

else if(mode==="enemy"){
const name=prompt("Tank name:");
if(!name)return;
tanks.push({
x,y,
color:"#ff3333",
name
});
}

else if(mode==="flag"){
const name=prompt("Spawn name:");
if(!name)return;

const color=prompt("Color? red/blue/green/yellow","red") || "red";

flags.push({
x,y,
name,
color
});
}

else if(mode==="arrow"){

if(!arrowStart){
arrowStart={x,y};
}else{
arrows.push({
x1:arrowStart.x,
y1:arrowStart.y,
x2:x,
y2:y,
color:"#ffffff"
});
arrowStart=null;
mode="us";
setActive("usBtn");
}

}

};

function drawGrid(){

ctx.strokeStyle="rgba(255,255,255,0.15)";
ctx.lineWidth=1;

for(let x=0;x<=canvas.width;x+=grid){
ctx.beginPath();
ctx.moveTo(x+leftOffset,0);
ctx.lineTo(x+leftOffset,canvas.height);
ctx.stroke();
}

for(let y=0;y<=canvas.height;y+=grid){
ctx.beginPath();
ctx.moveTo(0,y+topOffset);
ctx.lineTo(canvas.width,y+topOffset);
ctx.stroke();
}

ctx.fillStyle="#ff5555";
ctx.font="12px Arial";

for(let i=0;i<20;i++){
ctx.fillText(i+1,grid*i+22,18);
}

const letters="ABCDEFGHIJK";

for(let i=0;i<11;i++){
ctx.fillText(letters[i],8,grid*i+28);
}

}

function drawTank(t){

ctx.beginPath();
ctx.fillStyle=t.color;
ctx.arc(t.x,t.y,10,0,Math.PI*2);
ctx.fill();

ctx.strokeStyle="black";
ctx.lineWidth=2;
ctx.stroke();

ctx.fillStyle="#ff4444";
ctx.font="bold 11px Arial";
ctx.fillText(t.name,t.x+12,t.y-10);
}

function drawFlag(f){

ctx.fillStyle="#777";
ctx.fillRect(f.x-2,f.y-18,4,20);

ctx.beginPath();
ctx.moveTo(f.x+2,f.y-18);
ctx.lineTo(f.x+18,f.y-12);
ctx.lineTo(f.x+2,f.y-6);
ctx.closePath();

ctx.fillStyle=f.color;
ctx.fill();

ctx.fillStyle="#ff4444";
ctx.font="bold 11px Arial";
ctx.fillText(f.name,f.x+22,f.y-8);
}

function drawArrow(a){

ctx.strokeStyle=a.color;
ctx.lineWidth=4;

ctx.beginPath();
ctx.moveTo(a.x1,a.y1);
ctx.lineTo(a.x2,a.y2);
ctx.stroke();

const ang=Math.atan2(a.y2-a.y1,a.x2-a.x1);

ctx.beginPath();
ctx.moveTo(a.x2,a.y2);
ctx.lineTo(
a.x2-15*Math.cos(ang-0.4),
a.y2-15*Math.sin(ang-0.4)
);
ctx.lineTo(
a.x2-15*Math.cos(ang+0.4),
a.y2-15*Math.sin(ang+0.4)
);
ctx.closePath();
ctx.fillStyle=a.color;
ctx.fill();
}

function loop(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(img,0,0,canvas.width,canvas.height);

drawGrid();

flags.forEach(drawFlag);
arrows.forEach(drawArrow);
tanks.forEach(drawTank);

requestAnimationFrame(loop);
}

img.onload=()=>{
canvas.width=img.width;
canvas.height=img.height;
loop();
};
</script>

</body>
</html>
