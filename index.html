<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minimap Clean</title>

<style>
body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
margin:0;
padding:0;
}

#panel{
margin:10px;
padding:10px;
background:#1f1f1f;
border:1px solid #444;
border-radius:12px;
display:inline-block;
}

button{
padding:10px 14px;
margin:4px;
border:none;
border-radius:8px;
background:#2c2c2c;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#666;
}

.active{
background:#0a84ff !important;
}

#mapWrap{
position:relative;
display:inline-block;
}

#map{
width:900px;
display:block;
}

#canvas{
position:absolute;
left:0;
top:0;
cursor:crosshair;
}
</style>
</head>

<body>

<div id="panel">
<button id="usBtn">US</button>
<button id="enemyBtn">ENEMY</button>
<button id="flagBtn">FLAG</button>
<button id="arrowBtn">ARROW</button>
<button id="deleteBtn">DELETE</button>
<button id="saveBtn">SAVE</button>
<button id="loadBtn">LOAD</button>
<input type="color" id="picker" value="#2d8cff">
</div>

<br>

<div id="mapWrap">
<img id="map" src="map.png">
<canvas id="canvas"></canvas>
</div>

<script>
let map=document.getElementById("map");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let mode="us";
let currentColor="#2d8cff";

let size=45;

let tanks=[];
let flags=[];
let arrows=[];

let dragTank=null;
let arrowStart=null;

map.onload=setup;
window.onresize=setup;

function setup(){
canvas.width=map.clientWidth;
canvas.height=map.clientHeight;
draw();
}

function setMode(m){
mode=m;
arrowStart=null;
refreshUI();
}

function refreshUI(){

document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));

if(mode=="us") usBtn.classList.add("active");
if(mode=="enemy") enemyBtn.classList.add("active");
if(mode=="flag") flagBtn.classList.add("active");
if(mode=="arrow") arrowBtn.classList.add("active");

}

usBtn.onclick=function(){
currentColor="#2d8cff";
setMode("us");
picker.value=currentColor;
};

enemyBtn.onclick=function(){
currentColor="#ff4444";
setMode("enemy");
picker.value=currentColor;
};

flagBtn.onclick=function(){
setMode("flag");
};

arrowBtn.onclick=function(){
setMode("arrow");
};

picker.oninput=function(){
currentColor=this.value;
};

deleteBtn.onclick=function(){

if(arrows.length>0) arrows.pop();
else if(flags.length>0) flags.pop();
else if(tanks.length>0) tanks.pop();

draw();

};

saveBtn.onclick=function(){

localStorage.setItem("miniSave",JSON.stringify({
tanks:tanks,
flags:flags,
arrows:arrows
}));

};

loadBtn.onclick=function(){

let d=localStorage.getItem("miniSave");
if(!d)return;

let s=JSON.parse(d);

tanks=s.tanks||[];
flags=s.flags||[];
arrows=s.arrows||[];

draw();

};

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* GRID */

ctx.strokeStyle="rgba(255,255,255,0.18)";

for(let x=0;x<=canvas.width;x+=size){
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,canvas.height);
ctx.stroke();
}

for(let y=0;y<=canvas.height;y+=size){
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(canvas.width,y);
ctx.stroke();
}

/* LETTERS */

ctx.fillStyle="#ff5555";
ctx.font="7px Arial";

let letters="ABCDEFGHIJK";

for(let i=0;i<11;i++){
ctx.fillText(letters[i],3,i*45+22);
}

for(let i=1;i<=20;i++){
ctx.fillText(i,(i-1)*45+18,8);
}

/* ARROWS */

for(let a of arrows){

ctx.strokeStyle=a.color;
ctx.lineWidth=3;

ctx.beginPath();
ctx.moveTo(a.x1,a.y1);
ctx.lineTo(a.x2,a.y2);
ctx.stroke();

let ang=Math.atan2(a.y2-a.y1,a.x2-a.x1);

ctx.beginPath();
ctx.moveTo(a.x2,a.y2);
ctx.lineTo(a.x2-12*Math.cos(ang-0.4),a.y2-12*Math.sin(ang-0.4));
ctx.lineTo(a.x2-12*Math.cos(ang+0.4),a.y2-12*Math.sin(ang+0.4));
ctx.closePath();

ctx.fillStyle=a.color;
ctx.fill();

}

/* FLAGS */

for(let f of flags){

ctx.fillStyle=f.color;

/* maszt */
ctx.fillRect(f.x,f.y-18,3,22);

/* flaga */
ctx.beginPath();
ctx.moveTo(f.x+3,f.y-18);
ctx.lineTo(f.x+18,f.y-12);
ctx.lineTo(f.x+3,f.y-6);
ctx.closePath();
ctx.fill();

/* base */
ctx.fillRect(f.x-4,f.y+3,12,4);

ctx.fillStyle="#66ccff";
ctx.font="10px Arial";
ctx.fillText(f.name,f.x+22,f.y);

}

/* TANKS */

for(let t of tanks){

ctx.beginPath();
ctx.arc(t.x,t.y,8,0,Math.PI*2);
ctx.fillStyle=t.color;
ctx.fill();

ctx.strokeStyle="black";
ctx.stroke();

ctx.fillStyle="#66ccff";
ctx.font="10px Arial";
ctx.fillText(t.name,t.x+12,t.y-8);

}

}

/* CLICK */

canvas.onclick=function(e){

let r=canvas.getBoundingClientRect();

let x=e.clientX-r.left;
let y=e.clientY-r.top;

/* FLAG */

if(mode=="flag"){

let n=prompt("Flag name:");
if(n==null)n="Spawn";

flags.push({
x:x,
y:y,
name:n,
color:currentColor
});

draw();
return;
}

/* ARROW */

if(mode=="arrow"){

if(!arrowStart){

arrowStart={x:x,y:y};

}else{

arrows.push({
x1:arrowStart.x,
y1:arrowStart.y,
x2:x,
y2:y,
color:currentColor
});

arrowStart=null;
draw();

}

return;
}

/* TANK */

let n=prompt("Tank name:");
if(n==null)n="";

tanks.push({
x:x,
y:y,
name:n,
color:currentColor
});

draw();

};

/* DRAG */

canvas.onmousedown=function(e){

let r=canvas.getBoundingClientRect();

let x=e.clientX-r.left;
let y=e.clientY-r.top;

dragTank=null;

for(let t of tanks){

let dx=x-t.x;
let dy=y-t.y;

if(Math.sqrt(dx*dx+dy*dy)<10){
dragTank=t;
return;
}

}

};

canvas.onmousemove=function(e){

if(!dragTank)return;

let r=canvas.getBoundingClientRect();

dragTank.x=e.clientX-r.left;
dragTank.y=e.clientY-r.top;

draw();

};

canvas.onmouseup=function(){
dragTank=null;
};

refreshUI();
</script>

</body>
</html>
